<div class="screen-container">
    <h2>СКИНЫ</h2>
    <p class="screen-subtitle">баланс можно тратить покупая скины, чем дороже скин, тем больше пользы он приносит пользователю</p>
    <div class="skins-grid">
        <div class="skin-card active skin-basic" data-skin="basic" data-tap="+2" data-regen="1">
            <div class="skin-preview">
                <img src="icons/navigation/human-boy-person-man-svgrepo-com.svg" alt="Базовый">
            </div>
            <button class="skin-btn" disabled>выбран</button>
            <div class="skin-meta">
                <div>(+2 за нажатие)</div>
                <div>1/с реген</div>
            </div>
        </div>

        <div class="skin-card skin-advanced" data-skin="advanced" data-tap="+2" data-regen="2">
            <div class="skin-preview">
                <img src="icons/navigation/human-boy-person-man-svgrepo-com.svg" alt="Продвинутый">
            </div>
            <button class="skin-btn">Выбрать</button>
            <div class="skin-meta">
                <div>(+2 за нажатие)</div>
                <div>2/с реген</div>
            </div>
        </div>

        <div class="skin-card skin-pro" data-skin="pro" data-tap="+3" data-regen="3" data-price="2000">
            <div class="skin-preview">
                <img src="icons/navigation/human-boy-person-man-svgrepo-com.svg" alt="PRO">
            </div>
            <button class="skin-btn price">
                <div class="btn-content">
                    <span class="btn-price">2000</span>
                    <img src="icons/etc/Money_fill.svg" class="btn-icon" alt="">
                </div>
            </button>
            <div class="skin-meta">
                <div>(+3 за нажатие)</div>
                <div>3/с реген</div>
            </div>
        </div>

        <div class="skin-card skin-ultra" data-skin="ultra" data-tap="+3" data-regen="6" data-price="4000">
            <div class="skin-preview">
                <img src="icons/navigation/human-boy-person-man-svgrepo-com.svg" alt="ULTRA">
            </div>
            <button class="skin-btn price">
                <div class="btn-content">
                    <span class="btn-price">4000</span>
                    <img src="icons/etc/Money_fill.svg" class="btn-icon" alt="">
                </div>
            </button>
            <div class="skin-meta">
                <div>(+3 за нажатие)</div>
                <div>6/с реген</div>
            </div>
        </div>
    </div>
</div>
